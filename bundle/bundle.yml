schema_version: "1.0"

bundle:
  id: devflow
  name: DevFlow
  version: 0.1.1
  role: developer
  description: >-
    Autonomous, spec-driven development workflow: two human STOPs, a one-task-per-iteration
    build loop with maker/checker/judge verification, a documented review loopback, close-contract
    auto-commits, and a knowledge track that ends with guaranteed-populated decision records.
    Claude Code first.
  author: Jrecos
  license: MIT

integration:
  id: claude

requires:
  speckit_version: ">=0.12.0"
  tools: [git, claude]
  mcp: [semgrep]

provides:
  extensions:
    - id: git
      version: "1.0.0"
    - id: superspec
      version: "1.0.1"
    - id: devflow
      version: "0.1.1"
  presets:
    - id: devflow-plan-hardening
      version: "0.1.1"
      priority: 10
      strategy: replace   # the preset's templates ARE full lean-style replacements (provides.templates[].replaces)
  steps: []
  workflows:
    - id: devflow
      version: "0.1.1"

tags: [development, autonomous, spec-driven, verification, knowledge-base]
